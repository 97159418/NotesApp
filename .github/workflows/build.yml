name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - Check expo config error
        run: |
          echo "=== npx expo config output ==="
          npx expo config --json 2>&1 || true
          echo "=== index.js content ==="
          cat node_modules/expo-sqlite/build/index.js
          echo "=== Check if SQLiteDatabase.js exists ==="
          ls -la node_modules/expo-sqlite/build/SQLiteDatabase* 2>&1 || echo "NOT FOUND"
          echo "=== Check for SQLiteDataBase (capital B) ==="
          ls -la node_modules/expo-sqlite/build/SQLiteDataBase* 2>&1 || echo "NOT FOUND"
          echo "=== All JS files in build ==="
          ls node_modules/expo-sqlite/build/*.js 2>&1

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
