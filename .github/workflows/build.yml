name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - Check expo config error
        run: |
          set +e
          echo "=== npx expo config with stderr ==="
          npx expo config --json 1>/tmp/expo-stdout.txt 2>/tmp/expo-stderr.txt
          echo "Exit code: $?"
          echo "=== STDOUT ==="
          cat /tmp/expo-stdout.txt
          echo "=== STDERR ==="
          cat /tmp/expo-stderr.txt
          echo "=== Try directly importing with node ==="
          node -e "import('expo-sqlite').then(m => console.log('OK', Object.keys(m))).catch(e => console.error('FAIL', e.message))" 2>&1
          echo "=== Try require ==="
          node -e "try { console.log('OK', Object.keys(require('expo-sqlite'))) } catch(e) { console.error('FAIL', e.message) }" 2>&1
        shell: bash {0}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
