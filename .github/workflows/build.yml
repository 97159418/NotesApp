name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - Deep check
        run: |
          set +e
          echo "=== Node version ==="
          node --version
          echo "=== Check SQLiteDatabase.js directly ==="
          node -e "const fs = require('fs'); const p = require.resolve('expo-sqlite'); console.log('resolved:', p); const dir = require('path').dirname(p); console.log('files:', fs.readdirSync(dir).filter(f => f.includes('SQLiteDatabase')));"
          echo "=== Check if it's an ESM issue ==="
          node -e "const m = require('module'); console.log('builtinModules:', m.builtinModules.slice(0,3))"
          echo "=== Try loading SQLiteDatabase directly ==="
          node -e "try { require('./node_modules/expo-sqlite/build/SQLiteDatabase.js'); console.log('Direct require OK') } catch(e) { console.error('Direct require FAIL:', e.message) }"
          echo "=== Try with import ==="
          node --input-type=module -e "import { openDatabaseSync } from './node_modules/expo-sqlite/build/SQLiteDatabase.js'; console.log('Direct import OK')" 2>&1
          echo "=== Check package.json exports ==="
          node -e "const pkg = require('./node_modules/expo-sqlite/package.json'); console.log('exports:', JSON.stringify(pkg.exports, null, 2)); console.log('type:', pkg.type)"
          echo "=== npx expo doctor ==="
          npx expo doctor 2>&1 || true
        shell: bash {0}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
