name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - Check expo config
        run: |
          npx expo config --json 2>&1 || echo "expo config failed"
          echo "---"
          ls -la node_modules/expo-sqlite/build/ 2>&1 || echo "build dir not found"
          echo "---"
          cat node_modules/expo-sqlite/package.json | head -20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
