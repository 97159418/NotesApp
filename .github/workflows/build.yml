name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - Check expo config error
        run: |
          echo "=== npx expo config with stderr ==="
          npx expo config --json 1>/dev/null 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "=== Try npx expo config without --json ==="
          npx expo config 2>&1 | head -20 || true
          echo "=== Try directly importing index.js with node ==="
          node -e "import('expo-sqlite').then(m => console.log('OK', Object.keys(m))).catch(e => console.error('FAIL', e.message))" 2>&1 || true
          echo "=== Try require ==="
          node -e "try { console.log('OK', Object.keys(require('expo-sqlite'))) } catch(e) { console.error('FAIL', e.message) }" 2>&1 || true

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
